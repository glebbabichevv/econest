services:
  - type: web
    name: econest
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTO_MIGRATE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: econest-db
          property: connectionString
databases:
  - name: econest-db
    databaseName: econest
    user: econest
    plan: free